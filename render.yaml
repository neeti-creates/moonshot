services:
  - type: web
    name: moonshot-hunt
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NOUS_API_KEY
        sync: false
      - key: NOUS_BASE_URL
        sync: false
      - key: MOONSHOT_MODEL
        value: "tencent/hy3:free"
